<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0a0a0a" rx="10"/>
  
  <!-- Stylized Background Grid -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 100 0 L 100 200 M 200 0 L 200 200 M 300 0 L 300 200 M 400 0 L 400 200 M 500 0 L 500 200 M 600 0 L 600 200 M 700 0 L 700 200" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Logo Text -->
  <text x="40" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="64" fill="url(#grad1)" filter="url(#glow)">LLLM-Stats</text>
  <text x="45" y="145" font-family="monospace" font-size="14" fill="#555">LOCAL LLM PERFORMANCE MONITOR</text>

  <!-- Performance Pulse Line -->
  <path d="M 450 150 L 480 140 L 510 160 L 540 80 L 570 100 L 600 40 L 630 120 L 660 110 L 690 150 L 720 140" fill="none" stroke="url(#grad1)" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Status Dots -->
  <circle cx="750" cy="40" r="5" fill="#00ff00" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="760" y="45" font-family="monospace" font-size="12" fill="#00ff00">ONLINE</text>
</svg>
